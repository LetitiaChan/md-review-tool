<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD Human Review - UI Test Container</title>
    <!-- 生产 CSS（相对路径引用） -->
    <link rel="stylesheet" href="../../webview/css/style.css">
    <link rel="stylesheet" href="../../webview/css/markdown.css">
    <link rel="stylesheet" href="../../webview/css/annotations.css">
    <link rel="stylesheet" href="../../webview/css/settings.css">
    <link rel="stylesheet" href="../../webview/css/highlight-themes.css">
    <link rel="stylesheet" href="../../webview/css/katex.min.css">
</head>
<body>
    <!-- 顶部工具栏（简化版，仅保留测试需要的元素） -->
    <header class="toolbar">
        <div class="toolbar-left">
            <span class="file-name" id="fileName">测试文件</span>
            <span class="edit-status" id="editStatus"></span>
            <button class="btn btn-save-md" id="btnSaveMd" style="display:none;">💾</button>
            <span class="auto-save-status" id="autoSaveStatus"></span>
        </div>
        <div class="toolbar-center">
            <button class="btn-toggle-annotations" id="btnToggleToc" title="目录">📑</button>
            <button class="btn-toolbar-text" id="btnZenMode" title="禅模式">🧘</button>
            <button class="btn-toolbar-text" id="btnToggleTheme" title="主题">🌓</button>
            <button class="btn-mode-toggle" id="btnModeToggle" title="模式">
                <span class="mode-icon">👁</span>
            </button>
            <button class="btn-toggle-annotations" id="btnToggleAnnotations" title="批注">
                <span class="toggle-annotations-count" id="annotationCount">0 条批注</span>
            </button>
        </div>
        <div class="toolbar-right">
            <button class="btn btn-apply" id="btnApplyReview" disabled>🤖 AI 修复</button>
            <button class="btn-toolbar-icon" id="btnSettings" title="设置">⚙️</button>
            <button class="btn-toolbar-icon" id="btnRefresh" title="刷新">🔄</button>
        </div>
    </header>

    <!-- 欢迎页（初始隐藏） -->
    <div class="welcome" id="welcomeScreen" style="display:none;">
    </div>

    <!-- 编辑器容器 -->
    <div class="editor-container" id="editorContainer">
        <!-- 目录面板 -->
        <div class="toc-panel" id="tocPanel">
            <div class="resize-handle resize-handle-right" id="tocResizeHandle"></div>
            <div class="toc-header">
                <button class="panel-hide-btn" id="btnHideToc" title="隐藏目录">✕</button>
            </div>
            <div class="toc-search" id="tocSearch">
                <input type="text" class="toc-search-input" id="tocSearchInput" placeholder="搜索目录..." />
                <button class="toc-search-clear" id="tocSearchClear" style="display:none;">✕</button>
            </div>
            <div class="toc-list" id="tocList"></div>
        </div>

        <!-- WYSIWYG 工具栏 -->
        <div class="wysiwyg-toolbar" id="wysiwygToolbar" style="display:none;"></div>

        <!-- 搜索栏 -->
        <div class="search-bar" id="searchBar" style="display:none;">
            <input type="text" class="search-input" id="searchInput" placeholder="搜索..." />
            <span class="search-count" id="searchCount"></span>
            <button class="search-nav-btn" id="searchPrev">▲</button>
            <button class="search-nav-btn" id="searchNext">▼</button>
            <button class="search-close-btn" id="searchClose">✕</button>
        </div>

        <!-- 文档内容区域（核心） -->
        <div class="document-content" id="documentContent"></div>

        <!-- 回到顶部按钮 -->
        <button class="btn-scroll-top" id="btnScrollTop" title="回到顶部">⬆</button>

        <!-- 批注面板 -->
        <div class="annotations-panel" id="annotationsPanel">
            <div class="resize-handle resize-handle-left" id="annotationsResizeHandle"></div>
            <div class="annotations-header">
                <button class="btn btn-header-save" id="btnExport" disabled>💾</button>
                <button class="btn btn-header-clear" id="btnClearAll" disabled>🗑</button>
                <select class="sort-select" id="sortSelect">
                    <option value="position">按位置</option>
                    <option value="time">按时间</option>
                    <option value="type">按类型</option>
                </select>
                <button class="panel-hide-btn" id="btnHideAnnotations" title="隐藏批注">✕</button>
            </div>
            <div class="annotation-search" id="annotationSearch">
                <input type="text" class="annotation-search-input" id="annotationSearchInput" placeholder="搜索批注..." />
                <button class="annotation-search-clear" id="annotationSearchClear" style="display:none;">✕</button>
            </div>
            <div class="annotations-list" id="annotationsList"></div>
        </div>
    </div>

    <!-- Lightbox 容器（图表点击放大） -->
    <div class="lightbox-overlay" id="lightboxOverlay" style="display:none;">
        <div class="lightbox-content" id="lightboxContent"></div>
    </div>

    <!-- 第三方库（本地文件，与生产环境一致） -->
    <script src="../../webview/lib/marked.min.js"></script>
    <script src="../../webview/lib/marked-footnote.umd.js"></script>
    <script src="../../webview/lib/highlight.min.js"></script>
    <script src="../../webview/lib/turndown.js"></script>
    <script src="../../webview/lib/katex.min.js"></script>
    <script src="../../webview/lib/mermaid.min.js"></script>
    <script src="../../webview/lib/viz-global.js"></script>
    <script src="../../webview/lib/emoji-map.js"></script>

    <!-- VS Code API Mock（必须在生产 JS 之前加载） -->
    <script src="./mock-vscode.js"></script>

    <!-- 初始化 vscode 全局变量（模拟 index.html 中的行为） -->
    <script>
        // 使用 var 而非 const，确保 vscode 成为 window 全局属性
        // （const 在 <script> 顶层不会挂载到 window 上）
        var vscode = acquireVsCodeApi();
    </script>

    <!-- 生产 JS 已合并为 bundle（由 webview/build.config.mjs 打包） -->
    <!-- 注意：bundle 加载时会立即调用 initApp()，依赖 DOM 元素存在，因此必须在下方 placeholder 创建脚本之后加载 -->

    <!-- 在 bundle 加载前，动态创建所有缺失的 DOM 元素占位符 -->
    <!-- initApp 会在加载时立即绑定 DOM 事件，缺失元素会导致 null.addEventListener 报错 -->
    <script>
        (function() {
            // app.js 中通过 getElementById 绑定 addEventListener 的所有元素 ID
            const requiredIds = [
                'fileSelect', 'fileChangeBadge',
                'btnHelp', 'btnCloseHelp', 'btnCloseHelpOk',
                'btnCloseClearAll', 'btnCancelClearAll', 'btnConfirmClearAll',
                'btnCancelApply', 'btnCloseApplyConfirm', 'btnConfirmApply',
                'btnCloseApplyResult', 'btnCloseResultOk', 'btnExecuteAiInstruction',
                'btnTocMenu', 'tocMenuCollapseAll', 'tocMenuExpandAll', 'tocMenuDropdown',
                'commentModal', 'btnCloseModal', 'btnCancelComment', 'btnSubmitComment',
                'commentText', 'selectedTextPreview', 'commentModalTitle',
                'insertModal', 'btnCloseInsertModal', 'btnCancelInsert', 'btnSubmitInsert',
                'insertText', 'insertSelectedPreview', 'insertModalTitle',
                'clearAllModal', 'applyConfirmModal', 'applyResultModal', 'helpModal',
                'contextMenu', 'menuAddComment', 'menuMarkDelete', 'menuAddInsert', 'menuAddInsertBefore',
                'tableContextMenu', 'tableMenuInsertRowAbove', 'tableMenuInsertRowBelow',
                'tableMenuInsertColLeft', 'tableMenuInsertColRight',
                'tableMenuDeleteRow', 'tableMenuDeleteCol',
                'settingsPanel', 'btnCloseSettings', 'btnResetSettings',
                'fileSelectorGroup', 'applyResultContent', 'aiInstructionContent',
                'imageUploadInput', 'imagePreviewList',
                'insertImageUploadInput', 'insertImagePreviewList',
            ];
            requiredIds.forEach(id => {
                if (!document.getElementById(id)) {
                    const el = document.createElement('div');
                    el.id = id;
                    el.style.display = 'none';
                    document.body.appendChild(el);
                }
            });
        })();
    </script>

    <!-- 加载打包后的 bundle（包含 i18n/store/renderer/annotations/export/settings/app 全部模块） -->
    <script src="../../webview/dist/app.bundle.js"></script>

    <!-- 将 globalThis 挂载的业务模块再同步到 window 上（bundle 已挂 globalThis，此处冗余但保险） -->
    <!-- Playwright 的 page.evaluate 通过 window 访问，保持与迁移前的行为一致 -->
    <script>
        if (typeof globalThis.Renderer !== 'undefined') window.Renderer = globalThis.Renderer;
        if (typeof globalThis.Store !== 'undefined') window.Store = globalThis.Store;
        if (typeof globalThis.Annotations !== 'undefined') window.Annotations = globalThis.Annotations;
        if (typeof globalThis.Settings !== 'undefined') window.Settings = globalThis.Settings;
        if (typeof globalThis.I18n !== 'undefined') window.I18n = globalThis.I18n;
        if (typeof ExportManager !== 'undefined') window.ExportManager = ExportManager;
        if (typeof EMOJI_MAP !== 'undefined') window.EMOJI_MAP = EMOJI_MAP;
    </script>

    <!-- 测试环境初始化：触发 app.js 中的关键事件绑定 -->
    <!-- app.js 的 IIFE 在加载时会调用 init()，但某些绑定（如 lightbox）需要在渲染后手动触发 -->
    <script>
        (function() {
            // 暴露 app.js 内部的后渲染绑定函数到 window，供测试调用
            // app.js 是 IIFE，内部函数默认不可访问，需要通过 window.__testBindings 桥接
            window.__testBindings = {
                /**
                 * 触发 Mermaid 图表的 lightbox 绑定
                 * 在 app.js 中，bindMermaidLightbox 在 renderMathAndMermaid 后调用
                 */
                bindMermaidLightbox: function() {
                    const rendered = document.querySelectorAll('.mermaid-rendered');
                    rendered.forEach(function(el) {
                        if (el.dataset.lightboxBound) return;
                        el.dataset.lightboxBound = 'true';
                        el.title = '点击查看大图';
                        el.style.cursor = 'pointer';
                        el.addEventListener('click', function(e) {
                            e.stopPropagation();
                            // 调用 app.js 暴露的 openMermaidLightbox（如果可用）
                            // 否则使用简化版 lightbox
                            var svgEl = el.querySelector('svg');
                            if (!svgEl) return;

                            var overlay = document.createElement('div');
                            overlay.className = 'mermaid-lightbox-overlay';

                            var container = document.createElement('div');
                            container.className = 'mermaid-lightbox-container';

                            var content = document.createElement('div');
                            content.className = 'mermaid-lightbox-content';

                            var clonedSvg = svgEl.cloneNode(true);
                            content.appendChild(clonedSvg);
                            container.appendChild(content);
                            overlay.appendChild(container);

                            var closeBtn = document.createElement('button');
                            closeBtn.className = 'mermaid-lightbox-close';
                            closeBtn.innerHTML = '&times;';

                            function closeLightbox() { overlay.remove(); }

                            closeBtn.addEventListener('click', function(ev) { ev.stopPropagation(); closeLightbox(); });
                            overlay.appendChild(closeBtn);

                            // 点击遮罩层关闭
                            var clickStartX = 0, clickStartY = 0;
                            overlay.addEventListener('mousedown', function(ev) { clickStartX = ev.clientX; clickStartY = ev.clientY; });
                            overlay.addEventListener('click', function(ev) {
                                var dx = Math.abs(ev.clientX - clickStartX);
                                var dy = Math.abs(ev.clientY - clickStartY);
                                if (dx < 5 && dy < 5 && ev.target === overlay) closeLightbox();
                            });

                            // ESC 关闭
                            function onKeyDown(ev) {
                                if (ev.key === 'Escape') { closeLightbox(); document.removeEventListener('keydown', onKeyDown); }
                            }
                            document.addEventListener('keydown', onKeyDown);

                            document.body.appendChild(overlay);
                        });
                    });
                },

                /**
                 * 触发 Graphviz 图表的 lightbox 绑定
                 */
                bindGraphvizLightbox: function() {
                    var rendered = document.querySelectorAll('.graphviz-rendered');
                    rendered.forEach(function(el) {
                        if (el.dataset.lightboxBound) return;
                        el.dataset.lightboxBound = 'true';
                        el.title = '点击查看大图';
                        el.style.cursor = 'pointer';
                        el.addEventListener('click', function(e) {
                            e.stopPropagation();
                            window.__testBindings.bindMermaidLightbox.call(null);
                        });
                    });
                },

                /**
                 * 模拟 app.js 的 renderMathAndMermaid 后的绑定流程
                 * 在测试中注入 markdown 并渲染后调用此函数
                 */
                afterRender: function() {
                    this.bindMermaidLightbox();
                    this.bindGraphvizLightbox();
                },

                /**
                 * 标记测试容器已就绪
                 */
                ready: true
            };

            // 标记容器初始化完成
            window.__testContainerReady = true;
        })();
    </script>
</body>
</html>
